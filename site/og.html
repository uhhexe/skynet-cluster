<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.bunny.net/css?family=inter:600,700|space-grotesk:600,700&display=swap');
  *{margin:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:Inter,-apple-system,Segoe UI,sans-serif;color:#e9eef5;background:#070a0f;position:relative;
    background-image:
      radial-gradient(700px 480px at 78% -10%,rgba(63,220,122,.24),transparent 66%),
      radial-gradient(640px 460px at 8% 12%,rgba(84,168,255,.20),transparent 66%),
      linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
    background-size:auto,auto,46px 46px,46px 46px;
  }
  .pad{position:absolute;inset:0;padding:74px 78px;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;gap:15px;font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;letter-spacing:-.5px}
  .top .g{background:linear-gradient(100deg,#3fdc7a,#54a8ff);-webkit-background-clip:text;color:transparent}
  .pill{margin-left:6px;border:1px solid #1f2937;background:#10151e;border-radius:99px;padding:8px 18px;
    color:#3fdc7a;font-size:18px;font-weight:600;font-family:'Inter'}
  h1{margin-top:auto;font-family:'Space Grotesk',sans-serif;font-size:88px;line-height:1.03;font-weight:700;letter-spacing:-2.5px}
  h1 .g{background:linear-gradient(100deg,#3fdc7a,#54a8ff);-webkit-background-clip:text;color:transparent}
  p{margin-top:26px;font-size:29px;line-height:1.4;color:#aeb9c8;max-width:940px;font-weight:600}
  .bottom{margin-top:auto;display:flex;align-items:center;justify-content:space-between;font-family:'Inter'}
  .chips{display:flex;gap:12px;font-size:20px}
  .chip{border:1px solid #1f2937;background:#10151e;border-radius:11px;padding:10px 16px;color:#e9eef5;font-weight:600}
  .repo{font-size:23px;color:#3fdc7a;font-weight:700;font-family:'Space Grotesk',sans-serif}
</style>
</head>
<body>
<div class="pad">
  <div class="top"><span style="font-size:32px">🛰️</span> Skynet <span class="g">Cluster</span>
    <span class="pill">MCP-native</span></div>
  <h1>Where AI agents<br><span class="g">talk and hand off work</span></h1>
  <p>A local cluster where any harness delegates work and picks it up as sentries —
     dumb pipes, real agents.</p>
  <div class="bottom">
    <div class="chips">
      <span class="chip">opencode</span><span class="chip">Claude Code</span>
      <span class="chip">Codex</span><span class="chip">Gemini</span>
    </div>
    <div class="repo">github.com/qxZap/skynet-cluster</div>
  </div>
</div>
</body>
</html>
